# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
imports:
    # Order matters: the committed default sets app.llm_providers to [], then the
    # gitignored user file (if present) overrides it. Imports are always processed
    # before this file's own parameters block, so the default cannot live here.
    - { resource: 'llm_providers_default.yaml' }
    - { resource: 'llm_providers.yaml', ignore_errors: true }

parameters:
    app.llm_temperature: 1
    app.llm_timeout: 120   # seconds; idle+total budget for a generation (raise for slow reasoning models)
    app.files_dir: 'var/files'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    'App\Service\FilePathValidator':
        arguments:
            $projectRoot: '%kernel.project_dir%'
            $basePathRelative: '%app.files_dir%'

    'App\Service\FileStorageServiceInterface':
        alias: App\Service\FileStorageService

    'App\Service\LLMServiceInterface':
        alias: App\Service\LLMService

    'App\Service\LLMService':
        arguments:
            $providers: '%app.llm_providers%'
            $temperature: '%app.llm_temperature%'
            $timeout: '%app.llm_timeout%'

when@test:
    parameters:
        app.files_dir: 'var/files_test'
